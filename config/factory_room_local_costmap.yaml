local_costmap:
  # Using map avoids the delayed map->odom transform extrapolation seen after
  # the QR-room AMCL stage hands control to this planner.
  global_frame: map
  robot_base_frame: base_link
  update_frequency: 8.0
  publish_frequency: 1.0
  rolling_window: true
  width: 3.6
  height: 3.6
  resolution: 0.04
  always_send_full_costmap: false
  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
