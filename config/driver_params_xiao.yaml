port: /dev/base_serial_port #ttyUSB0 # base_serial_port
baud: 115200
base_frame: base_link
odom_frame: odom
joy_topic:  /joy
odom_topic: /odom
base_shape_a: 0.2180  
wheel_radius: 0.0495  
vel_topic: /cmd_vel
# provide_odom_tf: true
cmd_timeout: 0.2
serial_timeout: 50
linear_speed_max:  3.0
angular_speed_max: 3.14
Mileage_file_name:  car_Mileage_info.txt
debug_log:  false

# PID 闭环控制
enable_pid: true
kp_vx: 0.5
ki_vx: 0.2
kd_vx: 0.0
kp_vy: 0.5
ki_vy: 0.2
kd_vy: 0.0
kp_vth: 1.0
ki_vth: 0.3
kd_vth: 0.0

# 积分抗饱和上限
integral_limit_vx: 0.5
integral_limit_vy: 0.5
integral_limit_vth: 0.3

# 加速度斜坡 (m/s^2, rad/s^2)
max_accel_x: 1.0
max_accel_y: 1.0
max_accel_th: 2.0

# cmd_vel 低通滤波系数 (1.0=无滤波, 越小越平滑)
cmd_vel_filter_alpha: 0.8
