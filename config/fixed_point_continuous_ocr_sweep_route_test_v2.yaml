# First-stage points are unchanged. Each room scan point has a short prepoint
# behind its scan-start heading so the final approach is moving and front-first.
route_points:
  - {name: first_stage, x: -1.48, y: -0.45, yaw: 3.1415926536, tolerance: 0.10, require_yaw: false}
  - {name: doorway_approach, x: -0.85, y: -1.41, yaw: -1.5707963268, tolerance: 0.16, require_yaw: false}
  - {name: room_entry, x: -0.85, y: -1.90, yaw: -1.5707963268, tolerance: 0.20, require_yaw: false}
  - {name: d1_approach, x: -1.43, y: -2.97, yaw: 1.5707963268, tolerance: 0.11, require_yaw: true}
  - {name: d1, x: -1.43, y: -2.57, yaw: 1.5707963268, tolerance: 0.14, require_yaw: false}
  - {name: d2_approach, x: 0.693, y: -2.283, yaw: 2.3561944902, tolerance: 0.11, require_yaw: true}
  - {name: d2, x: 0.41, y: -2.00, yaw: 2.3561944902, tolerance: 0.14, require_yaw: false}
  - {name: d3_approach, x: 2.323, y: -2.227, yaw: -2.3561944902, tolerance: 0.11, require_yaw: true}
  - {name: d3, x: 2.04, y: -2.51, yaw: -2.3561944902, tolerance: 0.14, require_yaw: false}

# Activate only after the doorway/room-entry leg has completed. The cone-room
# route remains front-first and does not use lateral obstacle tricks.
dynamic_activation_route_point: d1_approach
dynamic_exclusion_radius_m: 0.25
dynamic_path_trigger_radius_m: 0.25
dynamic_candidate_path_gate_m: 0.33
dynamic_confirmed_ttl_s: 120.0
dynamic_stage_max_lateral_mps: 0.0
dynamic_observation_range_m: 2.10

# Merge noisy observations of one cone before rebuilding the temporary map.
dynamic_association_radius_m: 0.23
dynamic_track_merge_radius_m: 0.23
dynamic_signature_resolution_m: 0.07
dynamic_layer_update_min_interval_s: 0.65
dynamic_replan_min_interval_s: 1.80
dynamic_stuck_replan_s: 4.0

# Absolute map-frame scan arcs.
continuous_scan_specs:
  - {name: d1, start_deg: 90.0, direction: ccw, travel_deg: 225.0}
  - {name: d2, start_deg: 135.0, direction: cw, travel_deg: 90.0}
  - {name: d3, start_deg: 225.0, direction: ccw, travel_deg: 225.0}

# Unknown OCR vote-accumulation results never change motion speed. At the
# measured physical yaw rate, a sign remains visible for many 4 Hz OCR frames.
continuous_scan_max_speed_rps: 0.30
continuous_scan_min_speed_rps: 0.070
continuous_scan_acceleration_rps2: 0.65
continuous_scan_start_tolerance_deg: 2.5
continuous_scan_end_tolerance_deg: 1.8
continuous_scan_stable_frames: 2
continuous_scan_stall_timeout_s: 3.5

# Rotate smoothly at the spacious prepoint, then drive the final 40 cm toward
# the scan point with the camera already facing the scan-start heading.
route_yaw_tolerance_deg: 8.0
continuous_scan_approach_align_max_rps: 0.48
continuous_scan_approach_align_min_rps: 0.070
continuous_scan_approach_align_acceleration_rps2: 0.80
continuous_scan_route_transition_observe_s: 2.40
continuous_scan_safety_topic: /continuous_scan/safety_mode

# The v2 no-translation watchdog replaces the old absolute 42 s timeout.
continuous_scan_point_timeout_s: 999.0
continuous_scan_replan_failures: 3
route_translation_progress_m: 0.045
route_translation_stuck_timeout_s: 4.8
continuous_scan_candidate_retry_delay_s: 2.5

continuous_scan_approach_distance_m: 0.40
continuous_scan_arrival_blend_distance_m: 0.40
continuous_scan_arrival_heading_gain: 0.80
continuous_scan_arrival_heading_max_rps: 0.35
continuous_scan_arrival_large_error_deg: 38.0
continuous_scan_arrival_large_error_speed_mps: 0.10

continuous_scan_spin_min_gap_m: 0.015
continuous_scan_static_margin_m: 0.020
continuous_scan_dynamic_margin_m: 0.015
continuous_scan_candidate_offsets_m:
  - [0.00, 0.12]
  - [0.00, -0.12]
  - [0.12, 0.00]
  - [-0.12, 0.00]
  - [0.12, 0.12]
  - [-0.12, 0.12]
  - [0.12, -0.12]
  - [-0.12, -0.12]
  - [0.00, 0.24]
  - [0.00, -0.24]
  - [0.24, 0.00]
  - [-0.24, 0.00]
  - [0.18, 0.18]
  - [-0.18, 0.18]
  - [0.18, -0.18]
  - [-0.18, -0.18]

ocr_control_topic: /factory_room/ocr_control
ocr_result_topic: /factory_room/ocr_result
route_final_hold_s: 0.8
