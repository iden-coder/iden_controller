# Entrance and room observation points supplied for the real task.
navigate_start_pose: false
start_pose: [-0.85, -1.41, -1.5707963268]
observation_points:
  - {name: d1, x: -1.43, y: -2.57, yaw: 3.1415926536}
  - {name: d2, x: 0.41, y: -2.00, yaw: 1.5707963268}
  - {name: d3, x: 2.54, y: -2.51, yaw: -1.5707963268}

# If d1-d3 do not expose the target sign, generate extra safe viewpoints from
# their centroid, pairwise midpoints and a small ring around the room center.
adaptive_search_enabled: true
adaptive_ring_radius_m: 0.62
adaptive_min_spacing_m: 0.32
adaptive_point_limit: 6

# Bounded retries prevent one cone-occupied pose from blocking later tasks.
# Failure is reported as ERROR and the robot remains stopped; it is never
# reported as task success.
start_after_tts_s: 7.0
nav_goal_timeout_s: 75.0
nav_stuck_timeout_s: 9.0
nav_progress_m: 0.07
nav_goal_retries: 4
search_cycles: 2
mission_timeout_s: 600.0

scan_step_deg: 45.0
scan_turn_speed: 0.36
scan_settle_s: 1.20
spin_clearance_m: 0.27
image_mirrored: true

wall_standoff_m: 0.68
wall_final_distance_m: 0.29
square_front_hard_stop_m: 0.235
square_entry_distance_m: 0.25
square_approach_timeout_s: 28.0
square_lateral_tolerance_m: 0.09
square_speed_fast: 0.10
square_speed_slow: 0.055

# Two-stage parking: align while the frame is visible, then finish with
# odometry plus the lidar wall estimate after the frame passes under camera.
parking_align_tolerance_m: 0.055
parking_align_stable_frames: 5
parking_align_timeout_s: 10.0
parking_min_travel_m: 0.10
parking_max_travel_m: 0.52
parking_wall_tolerance_m: 0.04
parking_wall_fail_tolerance_m: 0.10
parking_lost_steer_hold_m: 0.06
parking_approach_timeout_s: 24.0
parking_speed_fast: 0.08
parking_speed_slow: 0.04
