# Circular room-only collision model.  The lidar safety layer still performs
# the final close-range stop around real cones and walls.
robot_radius: 0.16
transform_tolerance: 1.2

obstacle_layer:
  enabled: true
  combination_method: 1
  track_unknown_space: true
  obstacle_range: 2.8
  raytrace_range: 3.5
  observation_sources: laser_scan_sensor
  laser_scan_sensor:
    sensor_frame: laser_frame
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    inf_is_valid: true
    observation_persistence: 0.20
    expected_update_rate: 0.0

inflation_layer:
  enabled: true
  inflation_radius: 0.22
  cost_scaling_factor: 6.5

static_layer:
  enabled: true
  map_topic: /map
  subscribe_to_updates: false
